<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الإشعارات - بوابة الرشيد</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #F2F2F7;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; direction: rtl;
    }
    .card {
      background: white; border-radius: 24px; padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); text-align: center;
      max-width: 400px; width: 90%;
    }
    .card h1 { font-size: 1.8rem; margin-bottom: 12px; color: #1C1C1E; }
    .card p { color: #8E8E93; margin-bottom: 24px; }
    .btn {
      background: #58CC02; color: white; border: none;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 0 #46A302, 0 6px 20px rgba(88,204,2,0.3);
      transition: all 0.2s; font-family: 'Cairo', sans-serif;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #46A302; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #player-id-display {
      margin-top: 16px; padding: 12px; background: #F0FFF0;
      border: 2px solid #58CC02; border-radius: 12px;
      display: none; text-align: center;
    }
    #player-id-display .label { font-size: 0.75rem; color: #8E8E93; margin-bottom: 4px; }
    #player-id-display .id { font-size: 0.7rem; font-weight: 700; color: #1C1C1E; word-break: break-all; direction: ltr; cursor: pointer; }
    #status-msg { margin-top: 12px; font-size: 0.85rem; font-weight: 700; display: none; }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>📲 تفعيل الإشعارات</h1>
    <p>للحصول على تنبيهات الواجبات الجديدة، يرجى السماح بالإشعارات.</p>
    <button id="enable-btn" class="btn" disabled>
      <span id="btn-text">تفعيل الإشعارات</span>
      <span class="spinner" style="display:none" id="spinner"></span>
    </button>
    <div id="status-msg"></div>
    <div id="player-id-display">
      <div class="label">🆔 معرّف الاشتراك الخاص بك:</div>
      <div class="id" id="player-id-text">---</div>
    </div>
    <p style="margin-top:12px; font-size:0.8rem; color:#8E8E93">
      سيتم توجيهك إلى البوابة بعد التفعيل.
    </p>
  </div>

  <script>
    var APP_ID = "49858ccc-d3e8-427b-ab43-d7bb52273c1c";
    var PORTAL_URL = "https://script.google.com/macros/s/AKfycbxoZNksqNVsTboElZpMpdEDBo07Z-qI7bw0r99HELSzr37xHp3eOvvPP_aZs5F3MIbx/exec?view=sp2";

    var btn = document.getElementById('enable-btn');
    var btnText = document.getElementById('btn-text');
    var spinner = document.getElementById('spinner');
    var statusMsg = document.getElementById('status-msg');
    var playerIdDisplay = document.getElementById('player-id-display');
    var playerIdText = document.getElementById('player-id-text');

    function showStatus(text, color) {
      statusMsg.textContent = text;
      statusMsg.style.color = color || '#58CC02';
      statusMsg.style.display = 'block';
    }

    function showPlayerId(playerId) {
      playerIdText.textContent = playerId;
      playerIdDisplay.style.display = 'block';
    }

    function redirectToPortal(playerId) {
      var redirectUrl = PORTAL_URL;
      if (playerId) {
        redirectUrl += (redirectUrl.indexOf('?') === -1 ? '?' : '&') + 
                       'onesignal_player=' + encodeURIComponent(playerId);
      }
      showStatus('✅ جاري التوجيه إلى البوابة...', '#58CC02');
      setTimeout(function() {
        window.location.href = redirectUrl;
      }, 1500);
    }

    function handleSubscribe() {
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;
      showStatus('⏳ جاري طلب الإذن...', '#8E8E93');

      // 🔧 Use the RELIABLE showNativePrompt (not the new API)
      if (!window.OneSignal || typeof OneSignal.showNativePrompt !== 'function') {
        showStatus('⚠️ الخدمة لم تتحمل بعد. انتظر لحظة وحاول مجدداً.', '#FF4B4B');
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
        return;
      }

      // Check current permission first
      OneSignal.getNotificationPermission().then(function(permission) {
        console.log('📋 Current permission:', permission);

        if (permission === 'granted') {
          // Already subscribed – just get ID and redirect
          console.log('✅ Already subscribed');
          showStatus('✅ أنت مشترك بالفعل!', '#58CC02');
          OneSignal.getUserId().then(function(playerId) {
            console.log('🆔 Player ID:', playerId);
            showPlayerId(playerId);
            redirectToPortal(playerId);
          }).catch(function() {
            console.log('⚠️ Could not get Player ID');
            redirectToPortal(null);
          });
        } else if (permission === 'denied') {
          // Blocked – show instructions
          showStatus('❌ الإشعارات محظورة. افتح إعدادات Chrome للموقع واسمح بالإشعارات.', '#FF4B4B');
          btnText.style.display = 'inline';
          spinner.style.display = 'none';
          btn.disabled = false;
        } else {
          // 'default' – show the native prompt
          console.log('📢 Showing native prompt...');
          OneSignal.showNativePrompt().then(function() {
            console.log('✅ User accepted');
            showStatus('✅ تم التفعيل!', '#58CC02');
            // Get the Player ID
            OneSignal.getUserId().then(function(playerId) {
              console.log('🆔 Player ID:', playerId);
              showPlayerId(playerId);
              redirectToPortal(playerId);
            }).catch(function() {
              console.log('⚠️ Could not get Player ID');
              redirectToPortal(null);
            });
          }).catch(function(err) {
            console.error('❌ User denied or error:', err);
            showStatus('❌ لم يتم تفعيل الإشعارات. يمكنك المحاولة لاحقاً.', '#FF4B4B');
            btnText.style.display = 'inline';
            spinner.style.display = 'none';
            btn.disabled = false;
          });
        }
      });
    }

    // Initialize OneSignal
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: APP_ID,
        promptOptions: { autoPrompt: false }
      });
      btn.disabled = false;
      console.log('✅ OneSignal ready');
    });

    btn.addEventListener('click', handleSubscribe);
  </script>
</body>
</html>
