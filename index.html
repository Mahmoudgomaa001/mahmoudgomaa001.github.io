<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الإشعارات - بوابة الرشيد</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #F2F2F7;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; direction: rtl;
    }
    .card {
      background: white; border-radius: 24px; padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); text-align: center;
      max-width: 400px; width: 90%;
    }
    .card h1 { font-size: 1.8rem; margin-bottom: 12px; color: #1C1C1E; }
    .card p { color: #8E8E93; margin-bottom: 24px; }
    .btn {
      background: #58CC02; color: white; border: none;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 0 #46A302, 0 6px 20px rgba(88,204,2,0.3);
      transition: all 0.2s; font-family: 'Cairo', sans-serif;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #46A302; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .input-group {
      margin-bottom: 16px;
      text-align: right;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #1C1C1E;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #E5E5EA;
      border-radius: 12px;
      font-size: 1rem;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }
    .input-group input:focus {
      border-color: #58CC02;
      outline: none;
    }
    
    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalSlideIn 0.3s ease-out;
    }
    @keyframes modalSlideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-icon { font-size: 3rem; margin-bottom: 16px; }
    .modal h2 { margin: 0 0 8px 0; color: #1C1C1E; font-size: 1.4rem; }
    .modal p { color: #8E8E93; margin-bottom: 20px; font-size: 0.9rem; }
    .info-box {
      background: #F2F2F7;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: right;
    }
    .info-box label {
      display: block;
      font-size: 0.8rem;
      color: #8E8E93;
      margin-bottom: 4px;
    }
    .info-box .value {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      word-break: break-all;
      color: #007AFF;
      font-weight: 600;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn-primary {
      background: #58CC02;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      box-shadow: 0 4px 0 #46A302;
      transition: all 0.2s;
      flex: 1;
    }
    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #46A302;
    }
    .btn-secondary {
      background: #F2F2F7;
      color: #1C1C1E;
      border: none;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: background 0.2s;
      flex: 1;
    }
    .btn-secondary:hover { background: #E5E5EA; }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>📲 تفعيل الإشعارات</h1>
    <p>للحصول على تنبيهات الواجبات الجديدة، يرجى إدخال معرف الطالب ثم السماح بالإشعارات.</p>
    
    <div class="input-group">
      <label for="student-id">معرف الطالب (رقم الهوية أو البريد الإلكتروني):</label>
      <input type="text" id="student-id" placeholder="أدخل معرف الطالب" dir="ltr">
    </div>
    
    <button id="enable-btn" class="btn" disabled>
      <span id="btn-text">تفعيل الإشعارات</span>
      <span class="spinner" style="display:none" id="spinner"></span>
    </button>
    <p style="margin-top:16px; font-size:0.8rem; color:#8E8E93">
      سيتم توجيهك إلى البوابة بعد التفعيل.
    </p>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-icon">✅</div>
      <h2>تم تفعيل الإشعارات بنجاح!</h2>
      <p>تم تسجيل معرفك بنجاح:</p>
      <div class="info-box">
        <label>📱 معرف الطالب (External ID):</label>
        <div class="value" id="external-id-display"></div>
      </div>
      <div class="info-box" id="subscription-box" style="display:none;">
        <label>🔑 معرف الاشتراك (Subscription ID):</label>
        <div class="value" id="subscription-id-display"></div>
      </div>
      <div class="modal-buttons">
        <button class="btn-primary" onclick="continueToPortal()">
          متابعة للبوابة ←
        </button>
      </div>
    </div>
  </div>

  <script>
    // ---- Configuration ----
    var APP_ID = "49858ccc-d3e8-427b-ab43-d7bb52273c1c";
    var PORTAL_URL = "https://script.google.com/macros/s/AKfycbxoZNksqNVsTboElZpMpdEDBo07Z-qI7bw0r99HELSzr37xHp3eOvvPP_aZs5F3MIbx/exec?view=sp2";

    var btn = document.getElementById('enable-btn');
    var btnText = document.getElementById('btn-text');
    var spinner = document.getElementById('spinner');
    var studentIdInput = document.getElementById('student-id');
    var modalOverlay = document.getElementById('modal-overlay');
    var currentExternalId = null;
    var currentSubscriptionId = null;

    // Enable button when student ID is entered
    studentIdInput.addEventListener('input', function() {
      if (studentIdInput.value.trim().length > 0) {
        btn.disabled = false;
      } else {
        btn.disabled = true;
      }
    });

    // Initialize OneSignal
    window.addEventListener('load', function() {
      if (!window.OneSignalDeferred) { window.OneSignalDeferred = []; }
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: APP_ID,
          serviceWorkerPath: '/El-Rashid-Notifications/OneSignalSDKWorker.js',
          serviceWorkerParam: { scope: '/El-Rashid-Notifications/' },
          promptOptions: { autoPrompt: false }
        });
      });
    });

    // Function to get subscription ID
    async function getSubscriptionId() {
      try {
        // Try the documented API
        if (OneSignal.User.pushSubscription.getIdAsync) {
          const id = await OneSignal.User.pushSubscription.getIdAsync();
          if (id) return id;
        }
        
        // Try property access
        if (OneSignal.User.pushSubscription.id) {
          return OneSignal.User.pushSubscription.id;
        }
        
        // Try to get it from the subscription object
        const subscription = OneSignal.User.pushSubscription;
        if (subscription && subscription.id) {
          return subscription.id;
        }
        
        return null;
      } catch (error) {
        console.error('Error getting subscription ID:', error);
        return null;
      }
    }

    // Show success modal
    function showSuccessModal(externalId, subscriptionId) {
      currentExternalId = externalId;
      currentSubscriptionId = subscriptionId;
      
      document.getElementById('external-id-display').textContent = externalId;
      
      if (subscriptionId) {
        document.getElementById('subscription-box').style.display = 'block';
        document.getElementById('subscription-id-display').textContent = subscriptionId;
      }
      
      modalOverlay.classList.add('active');
    }

    // Continue to portal
    function continueToPortal() {
      let portalUrl = PORTAL_URL;
      
      // Add external_id as parameter (this is your custom ID that you can use to send notifications)
      if (currentExternalId) {
        portalUrl += '&external_id=' + encodeURIComponent(currentExternalId);
      }
      
      // Also add subscription_id if available
      if (currentSubscriptionId) {
        portalUrl += '&subscription_id=' + encodeURIComponent(currentSubscriptionId);
      }
      
      window.location.href = portalUrl;
    }
    window.continueToPortal = continueToPortal;

    // Button click handler
    btn.addEventListener('click', async function() {
      const studentId = studentIdInput.value.trim();
      
      if (!studentId) {
        alert('الرجاء إدخال معرف الطالب أولاً');
        return;
      }
      
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      try {
        // Request notification permission
        const accepted = await OneSignal.Notifications.requestPermission();
        
        if (accepted) {
          // Login with external_id (this creates a user with your custom ID)
          try {
            await OneSignal.User.login(studentId);
            console.log('Logged in with external_id:', studentId);
          } catch (loginError) {
            console.error('Login error:', loginError);
            // Continue even if login fails - the external_id will still work for identification
          }
          
          // Add a tag for additional identification
          try {
            await OneSignal.User.addTag('student_id', studentId);
            console.log('Added tag: student_id =', studentId);
          } catch (tagError) {
            console.error('Tag error:', tagError);
          }
          
          // Try to get subscription ID
          const subscriptionId = await getSubscriptionId();
          
          // Show success modal
          showSuccessModal(studentId, subscriptionId);
          
        } else {
          throw new Error('Permission denied');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('لم يتم تفعيل الإشعارات. يمكنك المحاولة لاحقاً من إعدادات المتصفح.');
      } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
