<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الإشعارات - بوابة الرشيد</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #F2F2F7;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; direction: rtl;
    }
    .card {
      background: white; border-radius: 24px; padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); text-align: center;
      max-width: 400px; width: 90%;
    }
    .card h1 { font-size: 1.8rem; margin-bottom: 12px; color: #1C1C1E; }
    .card p { color: #8E8E93; margin-bottom: 24px; }
    .btn {
      background: #58CC02; color: white; border: none;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 0 #46A302, 0 6px 20px rgba(88,204,2,0.3);
      transition: all 0.2s; font-family: 'Cairo', sans-serif;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #46A302; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalSlideIn 0.3s ease-out;
    }
    @keyframes modalSlideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-icon { font-size: 3rem; margin-bottom: 16px; }
    .modal h2 { margin: 0 0 8px 0; color: #1C1C1E; font-size: 1.4rem; }
    .modal p { color: #8E8E93; margin-bottom: 20px; font-size: 0.9rem; }
    .info-box {
      background: #F2F2F7;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      text-align: right;
    }
    .info-box label { display: block; font-size: 0.8rem; color: #8E8E93; margin-bottom: 4px; }
    .info-box .value {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      word-break: break-all;
      color: #007AFF;
      font-weight: 600;
    }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
    .btn-primary {
      background: #58CC02; color: white; border: none;
      padding: 12px 28px; font-size: 1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      font-family: 'Cairo', sans-serif;
      box-shadow: 0 4px 0 #46A302; flex: 1;
    }
    .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #46A302; }
    .btn-secondary {
      background: #F2F2F7; color: #1C1C1E; border: none;
      padding: 12px 28px; font-size: 1rem; font-weight: 600;
      border-radius: 50px; cursor: pointer;
      font-family: 'Cairo', sans-serif; flex: 1;
    }
    .btn-secondary:hover { background: #E5E5EA; }
    
    .debug-panel {
      background: #1C1C1E;
      color: #58CC02;
      padding: 12px;
      border-radius: 12px;
      margin-top: 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      text-align: left;
      direction: ltr;
      max-height: 150px;
      overflow-y: auto;
      display: block;
    }
    .debug-panel .warn { color: #FFC800; }
    .debug-panel .err { color: #FF4B4B; }
    .debug-panel .ok { color: #58CC02; }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>📲 تفعيل الإشعارات</h1>
    <p>للحصول على تنبيهات الواجبات الجديدة، يرجى السماح بالإشعارات.</p>
    
    <button id="enable-btn" class="btn" disabled>
      <span id="btn-text">تفعيل الإشعارات</span>
      <span class="spinner" style="display:none" id="spinner"></span>
    </button>
    
    <div class="debug-panel" id="debug-panel">
      <span class="ok">🟢 Waiting...</span>
    </div>
    
    <p style="margin-top:16px; font-size:0.8rem; color:#8E8E93">
      سيتم توجيهك إلى البوابة بعد التفعيل.
    </p>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-icon">✅</div>
      <h2>تم تفعيل الإشعارات بنجاح!</h2>
      <p>معرف الاشتراك الخاص بك:</p>
      
      <div class="info-box">
        <label>🔑 Subscription ID:</label>
        <div class="value" id="sub-id-display">-</div>
      </div>
      
      <div class="info-box" id="url-preview-box" style="display:none;">
        <label>🔗 سيتم التوجيه إلى:</label>
        <div class="value" id="url-preview" style="font-size:0.65rem;"></div>
      </div>
      
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="copyId()">📋 نسخ المعرف</button>
        <button class="btn-primary" onclick="goToPortal()">متابعة للبوابة ←</button>
      </div>
    </div>
  </div>

  <script>
    var APP_ID = "49858ccc-d3e8-427b-ab43-d7bb52273c1c";
    var PORTAL_URL = "https://script.google.com/macros/s/AKfycbxoZNksqNVsTboElZpMpdEDBo07Z-qI7bw0r99HELSzr37xHp3eOvvPP_aZs5F3MIbx/exec?view=sp2";

    var btn = document.getElementById('enable-btn');
    var btnText = document.getElementById('btn-text');
    var spinner = document.getElementById('spinner');
    var modalOverlay = document.getElementById('modal-overlay');
    var debugPanel = document.getElementById('debug-panel');
    var currentPlayerId = null;

    function debugLog(msg, type) {
      type = type || 'ok';
      var color = type === 'err' ? 'err' : type === 'warn' ? 'warn' : 'ok';
      debugPanel.innerHTML += '\n<span class="' + color + '">> ' + msg + '</span>';
      debugPanel.scrollTop = debugPanel.scrollHeight;
      console.log(msg);
    }

    window.addEventListener('load', function() {
      debugLog('Page loaded');
      if (!window.OneSignalDeferred) { window.OneSignalDeferred = []; }
      OneSignalDeferred.push(async function(OneSignal) {
        debugLog('SDK ready');
        await OneSignal.init({
          appId: APP_ID,
          serviceWorkerPath: '/El-Rashid-Notifications/OneSignalSDKWorker.js',
          serviceWorkerParam: { scope: '/El-Rashid-Notifications/' },
          promptOptions: { autoPrompt: false }
        });
        debugLog('Initialized');
        btn.disabled = false;
        debugLog('Button enabled');
      });
    });

    async function getSubscriptionId() {
      debugLog('Getting subscription ID...');
      try {
        await new Promise(resolve => setTimeout(resolve, 2000));
        var id = null;
        if (OneSignal.User.pushSubscription && OneSignal.User.pushSubscription.getIdAsync) {
          id = await OneSignal.User.pushSubscription.getIdAsync();
        }
        if (!id && OneSignal.User.pushSubscription && OneSignal.User.pushSubscription.id) {
          id = OneSignal.User.pushSubscription.id;
        }
        if (id) {
          debugLog('Got ID: ' + id.substring(0, 20) + '...');
        } else {
          debugLog('NO ID FOUND!', 'err');
        }
        return id;
      } catch(e) {
        debugLog('Error: ' + e.message, 'err');
        return null;
      }
    }

    function showModal(playerId) {
      currentPlayerId = playerId;
      
      if (playerId) {
        document.getElementById('sub-id-display').textContent = playerId;
        
        var finalUrl = PORTAL_URL + '&onesignal_player=' + encodeURIComponent(playerId);
        document.getElementById('url-preview-box').style.display = 'block';
        document.getElementById('url-preview').textContent = finalUrl;
        
        debugLog('Player ID: ' + playerId);
        debugLog('Will redirect to portal with ID');
      } else {
        document.getElementById('sub-id-display').textContent = 'لم يتم العثور على معرف';
        debugLog('No ID to send', 'warn');
      }
      
      modalOverlay.classList.add('active');
    }

    window.copyId = function() {
      if (!currentPlayerId) {
        alert('لا يوجد معرف لنسخه');
        return;
      }
      navigator.clipboard.writeText(currentPlayerId).then(function() {
        alert('✅ تم نسخ المعرف!');
        debugLog('ID copied');
      }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = currentPlayerId;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('✅ تم نسخ المعرف!');
      });
    };

    window.goToPortal = function() {
      if (currentPlayerId) {
        localStorage.setItem('sp_onesignal_playerid', currentPlayerId);
        var url = PORTAL_URL + '&onesignal_player=' + encodeURIComponent(currentPlayerId);
        debugLog('Going to: ' + url);
        window.location.href = url;
      } else {
        debugLog('Going to portal without ID', 'warn');
        window.location.href = PORTAL_URL;
      }
    };

    btn.addEventListener('click', async function() {
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;
      debugLog('Button clicked');

      try {
        debugLog('Requesting permission...');
        var accepted = await OneSignal.Notifications.requestPermission();
        
        if (accepted) {
          debugLog('Permission GRANTED!');
          var playerId = await getSubscriptionId();
          showModal(playerId);
        } else {
          debugLog('Permission denied', 'err');
          alert('لم يتم تفعيل الإشعارات');
        }
      } catch(e) {
        debugLog('Error: ' + e.message, 'err');
        alert('خطأ: ' + e.message);
      } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
