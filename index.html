<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الإشعارات - بوابة الرشيد</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #F2F2F7;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; direction: rtl;
    }
    .card {
      background: white; border-radius: 24px; padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); text-align: center;
      max-width: 400px; width: 90%;
    }
    .card h1 { font-size: 1.8rem; margin-bottom: 12px; color: #1C1C1E; }
    .card p { color: #8E8E93; margin-bottom: 24px; }
    .btn {
      background: #58CC02; color: white; border: none;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 0 #46A302, 0 6px 20px rgba(88,204,2,0.3);
      transition: all 0.2s; font-family: 'Cairo', sans-serif;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #46A302; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Debug panel */
    .debug-panel {
      background: #1C1C1E;
      color: #58CC02;
      padding: 12px;
      border-radius: 12px;
      margin-top: 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      text-align: left;
      direction: ltr;
      max-height: 150px;
      overflow-y: auto;
      display: block;
    }
    .debug-panel .warn { color: #FFC800; }
    .debug-panel .err { color: #FF4B4B; }
    .debug-panel .ok { color: #58CC02; }
    
    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-icon { font-size: 3rem; margin-bottom: 16px; }
    .modal h2 { margin: 0 0 8px 0; color: #1C1C1E; font-size: 1.4rem; }
    .info-box {
      background: #F2F2F7;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      text-align: right;
    }
    .info-box label { display: block; font-size: 0.75rem; color: #8E8E93; margin-bottom: 4px; }
    .info-box .value {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      word-break: break-all;
      color: #007AFF;
      font-weight: 600;
    }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
    .btn-primary {
      background: #58CC02; color: white; border: none;
      padding: 12px 28px; font-size: 1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer; font-family: 'Cairo', sans-serif;
      box-shadow: 0 4px 0 #46A302; flex: 1;
    }
    .btn-secondary {
      background: #F2F2F7; color: #1C1C1E; border: none;
      padding: 12px 28px; font-size: 1rem; font-weight: 600;
      border-radius: 50px; cursor: pointer; font-family: 'Cairo', sans-serif; flex: 1;
    }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>📲 تفعيل الإشعارات</h1>
    <p>للحصول على تنبيهات الواجبات الجديدة، يرجى السماح بالإشعارات.</p>
    
    <button id="enable-btn" class="btn" disabled>
      <span id="btn-text">تفعيل الإشعارات</span>
      <span class="spinner" style="display:none" id="spinner"></span>
    </button>
    
    <!-- Debug Panel - ALWAYS VISIBLE for testing -->
    <div class="debug-panel" id="debug-panel">
      <span class="ok">🟢 Waiting for OneSignal...</span>
    </div>
    
    <p style="margin-top:16px; font-size:0.8rem; color:#8E8E93">
      سيتم توجيهك إلى البوابة بعد التفعيل.
    </p>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-icon">✅</div>
      <h2>تم تفعيل الإشعارات بنجاح!</h2>
      <p>تم الحصول على المعرفات:</p>
      
      <div class="info-box">
        <label>🔑 Subscription ID:</label>
        <div class="value" id="sub-id-display">-</div>
      </div>
      
      <div class="info-box">
        <label>👤 OneSignal ID:</label>
        <div class="value" id="onesignal-id-display">-</div>
      </div>
      
      <div class="info-box">
        <label>🔗 سيتم الإرسال كـ onesignal_player:</label>
        <div class="value" id="player-id-display" style="color:#58CC02;">-</div>
      </div>
      
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="testCopy()">📋 نسخ</button>
        <button class="btn-primary" onclick="testGo()">متابعة ←</button>
      </div>
    </div>
  </div>

  <script>
    var APP_ID = "49858ccc-d3e8-427b-ab43-d7bb52273c1c";
    var PORTAL_URL = "https://script.google.com/macros/s/AKfycbxoZNksqNVsTboElZpMpdEDBo07Z-qI7bw0r99HELSzr37xHp3eOvvPP_aZs5F3MIbx/exec?view=sp2";

    var btn = document.getElementById('enable-btn');
    var btnText = document.getElementById('btn-text');
    var spinner = document.getElementById('spinner');
    var modalOverlay = document.getElementById('modal-overlay');
    var debugPanel = document.getElementById('debug-panel');
    var currentPlayerId = null;

    function debugLog(msg, type) {
      type = type || 'ok';
      var color = type === 'err' ? 'err' : type === 'warn' ? 'warn' : 'ok';
      debugPanel.innerHTML += '\n<span class="' + color + '">' + msg + '</span>';
      debugPanel.scrollTop = debugPanel.scrollHeight;
      console.log(msg);
    }

    // Initialize
    window.addEventListener('load', function() {
      debugLog('🟢 Page loaded');
      
      if (!window.OneSignalDeferred) { window.OneSignalDeferred = []; }
      OneSignalDeferred.push(async function(OneSignal) {
        debugLog('🟢 SDK ready');
        
        await OneSignal.init({
          appId: APP_ID,
          serviceWorkerPath: '/El-Rashid-Notifications/OneSignalSDKWorker.js',
          serviceWorkerParam: { scope: '/El-Rashid-Notifications/' },
          promptOptions: { autoPrompt: false }
        });
        
        debugLog('🟢 Initialized');
        btn.disabled = false;
      });
    });

    async function getSubscriptionId() {
      debugLog('🔍 Getting subscription ID...');
      try {
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        var id = null;
        
        if (OneSignal.User.pushSubscription.getIdAsync) {
          id = await OneSignal.User.pushSubscription.getIdAsync();
        }
        if (!id && OneSignal.User.pushSubscription.id) {
          id = OneSignal.User.pushSubscription.id;
        }
        
        if (id) {
          debugLog('✅ Subscription ID: ' + id.substring(0,20) + '...');
          return id;
        }
        debugLog('⚠️ No subscription ID', 'warn');
        return null;
      } catch(e) {
        debugLog('❌ Error: ' + e.message, 'err');
        return null;
      }
    }

    async function getOnesignalId() {
      debugLog('🔍 Getting OneSignal ID...');
      try {
        if (OneSignal.User && OneSignal.User.onesignalId) {
          var id = OneSignal.User.onesignalId;
          debugLog('✅ OneSignal ID: ' + id.substring(0,20) + '...');
          return id;
        }
        debugLog('⚠️ No OneSignal ID', 'warn');
        return null;
      } catch(e) {
        debugLog('❌ Error: ' + e.message, 'err');
        return null;
      }
    }

    function showModal(subscriptionId, onesignalId) {
      currentPlayerId = subscriptionId || onesignalId;
      
      document.getElementById('sub-id-display').textContent = subscriptionId || 'غير متوفر';
      document.getElementById('onesignal-id-display').textContent = onesignalId || 'غير متوفر';
      document.getElementById('player-id-display').textContent = currentPlayerId || 'لا يوجد';
      
      debugLog('📊 Modal shown');
      debugLog('   Player ID to send: ' + (currentPlayerId || 'NONE'));
      debugLog('   Portal URL will be: ' + PORTAL_URL + '&onesignal_player=' + encodeURIComponent(currentPlayerId || ''));
      
      modalOverlay.classList.add('active');
    }

    // TEST: Copy the URL that will be used
    window.testCopy = function() {
      if (!currentPlayerId) {
        alert('لا يوجد معرف!');
        return;
      }
      var url = PORTAL_URL + '&onesignal_player=' + encodeURIComponent(currentPlayerId);
      navigator.clipboard.writeText(url).then(function() {
        alert('✅ تم نسخ الرابط الكامل!\n\n' + url);
        debugLog('📋 Copied: ' + url);
      }).catch(function() {
        prompt('انسخ الرابط:', url);
      });
    };

    // TEST: Go to portal
    window.testGo = function() {
      if (!currentPlayerId) {
        alert('لا يوجد معرف! سيتم التوجيه بدون معرف');
        window.location.href = PORTAL_URL;
        return;
      }
      
      var url = PORTAL_URL + '&onesignal_player=' + encodeURIComponent(currentPlayerId);
      
      // Store for verification
      localStorage.setItem('sp_onesignal_playerid', currentPlayerId);
      localStorage.setItem('sp_test_timestamp', new Date().toISOString());
      localStorage.setItem('sp_test_url', url);
      
      debugLog('🚀 Stored in localStorage:');
      debugLog('   sp_onesignal_playerid = ' + currentPlayerId);
      debugLog('🚀 Navigating to portal...');
      
      // Delay to see debug
      setTimeout(function() {
        window.location.href = url;
      }, 1000);
    };

    // Button click
    btn.addEventListener('click', async function() {
      debugLog('🖱️ Button clicked');
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      try {
        debugLog('🔔 Requesting permission...');
        var accepted = await OneSignal.Notifications.requestPermission();
        
        if (accepted) {
          debugLog('✅ Permission granted!');
          var subId = await getSubscriptionId();
          var osId = await getOnesignalId();
          showModal(subId, osId);
        } else {
          debugLog('❌ Permission denied', 'err');
          alert('لم يتم تفعيل الإشعارات');
        }
      } catch(e) {
        debugLog('❌ Error: ' + e.message, 'err');
      } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
