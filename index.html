<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الإشعارات - بوابة الرشيد</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #F2F2F7;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; direction: rtl;
    }
    .card {
      background: white; border-radius: 24px; padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); text-align: center;
      max-width: 400px; width: 90%;
    }
    .card h1 { font-size: 1.8rem; margin-bottom: 12px; color: #1C1C1E; }
    .card p { color: #8E8E93; margin-bottom: 24px; }
    .btn {
      background: #58CC02; color: white; border: none;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 0 #46A302, 0 6px 20px rgba(88,204,2,0.3);
      transition: all 0.2s; font-family: 'Cairo', sans-serif;
      display: inline-block;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #46A302; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .spinner {
      display: none; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>📲 تفعيل الإشعارات</h1>
    <p>للحصول على تنبيهات الواجبات الجديدة، يرجى السماح بالإشعارات.</p>
    <button id="enable-btn" class="btn" disabled>
      <span class="spinner" id="spinner"></span>
      <span id="btn-text">تفعيل الإشعارات</span>
    </button>
    <p style="margin-top:12px; font-size:0.8rem; color:#8E8E93">
      سيتم توجيهك إلى البوابة بعد التفعيل.
    </p>
  </div>

  <script>
    // ---- Configuration ----
    var APP_ID = "49858ccc-d3e8-427b-ab43-d7bb52273c1c";
    var PORTAL_URL = "https://script.google.com/macros/s/AKfycbxoZNksqNVsTboElZpMpdEDBo07Z-qI7bw0r99HELSzr37xHp3eOvvPP_aZs5F3MIbx/exec?view=sp2";

    var btn = document.getElementById('enable-btn');
    var btnText = document.getElementById('btn-text');
    var spinner = document.getElementById('spinner');

    function showLoading() {
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;
    }

    function hideLoading() {
      btnText.style.display = 'inline';
      spinner.style.display = 'none';
      btn.disabled = false;
    }

    // Wait for OneSignal to be ready
    function waitForOneSignal(callback, timeout) {
      timeout = timeout || 15000;
      var start = Date.now();
      function check() {
        if (window.OneSignal && typeof OneSignal.showNativePrompt === 'function') {
          callback();
        } else if (Date.now() - start < timeout) {
          setTimeout(check, 200);
        } else {
          alert('⚠️ تعذر تحميل خدمة الإشعارات. يرجى استخدام متصفح Chrome.');
          hideLoading();
        }
      }
      check();
    }

    // Redirect to portal with player ID
    function redirectToPortal(playerId) {
      var redirectUrl = PORTAL_URL;
      if (playerId) {
        redirectUrl += (redirectUrl.indexOf('?') === -1 ? '?' : '&') + 
                       'onesignal_player=' + encodeURIComponent(playerId);
      }
      console.log('🔗 Redirecting to:', redirectUrl);
      setTimeout(function() {
        window.location.href = redirectUrl;
      }, 1000);
    }

    // Initialize OneSignal
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: APP_ID,
        promptOptions: { autoPrompt: false }
      });
      btn.disabled = false;
      console.log('✅ OneSignal ready');
    });

    // Button click handler
    btn.addEventListener('click', function() {
      showLoading();
      console.log('🔔 Button clicked');

      waitForOneSignal(function() {
        // Check if already subscribed
        OneSignal.getNotificationPermission().then(function(permission) {
          console.log('📋 Current permission:', permission);
          
          if (permission === 'granted') {
            // Already subscribed – just get player ID and redirect
            console.log('✅ Already subscribed, getting player ID...');
            OneSignal.getUserId().then(function(playerId) {
              console.log('🆔 Player ID:', playerId);
              redirectToPortal(playerId);
            }).catch(function() {
              console.log('⚠️ Could not get player ID, redirecting anyway');
              redirectToPortal(null);
            });
          } else {
            // Not yet subscribed – show prompt
            console.log('📢 Showing native prompt...');
            OneSignal.showNativePrompt().then(function() {
              console.log('✅ User accepted');
              // Get the player ID after accepting
              OneSignal.getUserId().then(function(playerId) {
                console.log('🆔 Player ID:', playerId);
                redirectToPortal(playerId);
              }).catch(function() {
                console.log('⚠️ Could not get player ID');
                redirectToPortal(null);
              });
            }).catch(function(err) {
              console.error('❌ User denied:', err);
              alert('لم يتم تفعيل الإشعارات. يمكنك المحاولة لاحقاً من إعدادات Chrome.');
              hideLoading();
            });
          }
        });
      });
    });
  </script>
</body>
</html>
