<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الإشعارات - بوابة الرشيد</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #F2F2F7;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; direction: rtl;
    }
    .card {
      background: white; border-radius: 24px; padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); text-align: center;
      max-width: 400px; width: 90%;
    }
    .card h1 { font-size: 1.8rem; margin-bottom: 12px; color: #1C1C1E; }
    .card p { color: #8E8E93; margin-bottom: 24px; }
    .btn {
      background: #58CC02; color: white; border: none;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 0 #46A302, 0 6px 20px rgba(88,204,2,0.3);
      transition: all 0.2s; font-family: 'Cairo', sans-serif;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #46A302; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalSlideIn 0.3s ease-out;
    }
    @keyframes modalSlideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    .modal-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .modal h2 {
      margin: 0 0 8px 0;
      color: #1C1C1E;
      font-size: 1.4rem;
    }
    .modal p {
      color: #8E8E93;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    .subscription-id-box {
      background: #F2F2F7;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: right;
    }
    .subscription-id-box label {
      display: block;
      font-size: 0.8rem;
      color: #8E8E93;
      margin-bottom: 8px;
    }
    .id-display {
      background: white;
      padding: 12px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      word-break: break-all;
      color: #007AFF;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .copy-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .copy-icon-btn:hover {
      background: #E5E5EA;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn-primary {
      background: #58CC02;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      box-shadow: 0 4px 0 #46A302;
      transition: all 0.2s;
      flex: 1;
    }
    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #46A302;
    }
    .btn-secondary {
      background: #F2F2F7;
      color: #1C1C1E;
      border: none;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: background 0.2s;
      flex: 1;
    }
    .btn-secondary:hover {
      background: #E5E5EA;
    }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>📲 تفعيل الإشعارات</h1>
    <p>للحصول على تنبيهات الواجبات الجديدة، يرجى السماح بالإشعارات.</p>
    <button id="enable-btn" class="btn" disabled>
      <span id="btn-text">تفعيل الإشعارات</span>
      <span class="spinner" style="display:none" id="spinner"></span>
    </button>
    <p style="margin-top:16px; font-size:0.8rem; color:#8E8E93">
      سيتم توجيهك إلى البوابة بعد التفعيل.
    </p>
  </div>

  <!-- Modal Popup -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-icon">✅</div>
      <h2>تم تفعيل الإشعارات بنجاح!</h2>
      <p>هذا هو معرف الاشتراك الخاص بك:</p>
      <div class="subscription-id-box">
        <label>📱 معرف الاشتراك (Subscription ID):</label>
        <div class="id-display">
          <span id="subscription-id-text">جاري تحميل المعرف...</span>
          <button class="copy-icon-btn" onclick="copyToClipboard()" title="نسخ المعرف">
            📋
          </button>
        </div>
      </div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="copyAndContinue()">
          📋 نسخ ومتابعة
        </button>
        <button class="btn-primary" onclick="continueToPortal()">
          متابعة للبوابة ←
        </button>
      </div>
    </div>
  </div>

  <script>
    // ---- Configuration ----
    var APP_ID = "49858ccc-d3e8-427b-ab43-d7bb52273c1c";
    var PORTAL_URL = "https://script.google.com/macros/s/AKfycbxoZNksqNVsTboElZpMpdEDBo07Z-qI7bw0r99HELSzr37xHp3eOvvPP_aZs5F3MIbx/exec?view=sp2";

    var btn = document.getElementById('enable-btn');
    var btnText = document.getElementById('btn-text');
    var spinner = document.getElementById('spinner');
    var modalOverlay = document.getElementById('modal-overlay');
    var subscriptionIdText = document.getElementById('subscription-id-text');
    var currentSubscriptionId = null;

    // Initialize OneSignal
    window.addEventListener('load', function() {
      if (!window.OneSignalDeferred) { window.OneSignalDeferred = []; }
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: APP_ID,
          serviceWorkerPath: '/El-Rashid-Notifications/OneSignalSDKWorker.js',
          serviceWorkerParam: { scope: '/El-Rashid-Notifications/' },
          promptOptions: { autoPrompt: false }
        });
        
        // Enable the button
        btn.disabled = false;
        
        // Set up subscription change listener to get ID automatically
        OneSignal.User.pushSubscription.addEventListener('change', function(subscription) {
          console.log('Subscription changed:', subscription);
          if (subscription.current && subscription.current.id) {
            console.log('Subscription ID:', subscription.current.id);
            // Store the ID if we have a modal open
            if (modalOverlay.classList.contains('active') && !currentSubscriptionId) {
              updateModalWithId(subscription.current.id);
            }
          }
        });
      });
    });

    // Function to get subscription ID - using official web API
    async function getSubscriptionId() {
      try {
        // Method 1: Direct API call as per documentation
        const subscriptionId = await OneSignal.User.pushSubscription.getIdAsync();
        if (subscriptionId) {
          console.log('Got subscription ID via getIdAsync:', subscriptionId);
          return subscriptionId;
        }
        
        // Method 2: Check if it's already available as a property
        if (OneSignal.User.pushSubscription.id) {
          console.log('Got subscription ID via property:', OneSignal.User.pushSubscription.id);
          return OneSignal.User.pushSubscription.id;
        }
        
        // Method 3: Try getting the user-level OneSignal ID as fallback
        const onesignalId = OneSignal.User.onesignalId;
        if (onesignalId) {
          console.log('Got OneSignal User ID:', onesignalId);
          return onesignalId;
        }
        
        console.log('No ID available yet');
        return null;
      } catch (error) {
        console.error('Error getting subscription ID:', error);
        return null;
      }
    }

    // Update modal with subscription ID
    function updateModalWithId(subscriptionId) {
      if (subscriptionId) {
        currentSubscriptionId = subscriptionId;
        subscriptionIdText.textContent = subscriptionId;
      } else {
        subscriptionIdText.textContent = 'لم يتم العثور على المعرف. يرجى المحاولة مرة أخرى.';
      }
    }

    // Copy to clipboard function
    async function copyToClipboard() {
      if (currentSubscriptionId && currentSubscriptionId !== 'جاري تحميل المعرف...') {
        try {
          await navigator.clipboard.writeText(currentSubscriptionId);
          alert('✅ تم نسخ المعرف بنجاح!');
        } catch (err) {
          // Fallback
          const textArea = document.createElement('textarea');
          textArea.value = currentSubscriptionId;
          textArea.style.position = 'fixed';
          textArea.style.left = '-9999px';
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
            alert('✅ تم نسخ المعرف بنجاح!');
          } catch (err) {
            alert('❌ فشل نسخ المعرف. يرجى نسخه يدوياً.');
          }
          document.body.removeChild(textArea);
        }
      } else {
        alert('⚠️ لا يوجد معرف لنسخه بعد.');
      }
    }

    // Copy and continue
    async function copyAndContinue() {
      if (currentSubscriptionId && currentSubscriptionId !== 'جاري تحميل المعرف...') {
        await copyToClipboard();
      }
      continueToPortal();
    }

    // Continue to portal
    function continueToPortal() {
      if (currentSubscriptionId && currentSubscriptionId !== 'جاري تحميل المعرف...' && currentSubscriptionId !== 'لم يتم العثور على المعرف. يرجى المحاولة مرة أخرى.') {
        const portalUrlWithId = PORTAL_URL + '&subscription_id=' + encodeURIComponent(currentSubscriptionId);
        window.location.href = portalUrlWithId;
      } else {
        window.location.href = PORTAL_URL;
      }
    }

    // Make functions globally accessible
    window.copyToClipboard = copyToClipboard;
    window.copyAndContinue = copyAndContinue;
    window.continueToPortal = continueToPortal;

    // Button click handler
    btn.addEventListener('click', async function() {
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      try {
        // Request notification permission
        const accepted = await OneSignal.Notifications.requestPermission();
        
        if (accepted) {
          // Show modal immediately
          modalOverlay.classList.add('active');
          
          // Try to get subscription ID with retries
          let subscriptionId = null;
          let attempts = 0;
          
          while (!subscriptionId && attempts < 5) {
            subscriptionId = await getSubscriptionId();
            if (!subscriptionId) {
              attempts++;
              await new Promise(resolve => setTimeout(resolve, 1000));
              console.log(`Retry attempt ${attempts} to get subscription ID...`);
            }
          }
          
          // Update modal with the ID
          updateModalWithId(subscriptionId);
          
        } else {
          throw new Error('Permission denied');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('لم يتم تفعيل الإشعارات. يمكنك المحاولة لاحقاً من إعدادات المتصفح.');
        modalOverlay.classList.remove('active');
      } finally {
        // Reset button
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
