<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الإشعارات - بوابة الرشيد</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #F2F2F7;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; direction: rtl;
    }
    .card {
      background: white; border-radius: 24px; padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); text-align: center;
      max-width: 400px; width: 90%;
    }
    .card h1 { font-size: 1.8rem; margin-bottom: 12px; color: #1C1C1E; }
    .card p { color: #8E8E93; margin-bottom: 24px; }
    .btn {
      background: #58CC02; color: white; border: none;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 0 #46A302, 0 6px 20px rgba(88,204,2,0.3);
      transition: all 0.2s; font-family: 'Cairo', sans-serif;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #46A302; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .subscription-info {
      background: #F2F2F7;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      text-align: right;
      display: none;
    }
    .subscription-info h3 {
      margin: 0 0 8px 0;
      font-size: 1rem;
      color: #1C1C1E;
    }
    .subscription-id {
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.75rem;
      word-break: break-all;
      color: #007AFF;
      margin-bottom: 8px;
    }
    .copy-btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 6px 16px;
      font-size: 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
    }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>📲 تفعيل الإشعارات</h1>
    <p>للحصول على تنبيهات الواجبات الجديدة، يرجى السماح بالإشعارات.</p>
    <button id="enable-btn" class="btn" disabled>
      <span id="btn-text">تفعيل الإشعارات</span>
      <span class="spinner" style="display:none" id="spinner"></span>
    </button>
    
    <div class="subscription-info" id="subscription-info">
      <h3>معرف الاشتراك الخاص بك:</h3>
      <div class="subscription-id" id="subscription-id"></div>
      <button class="copy-btn" onclick="copySubscriptionId()">نسخ المعرف</button>
    </div>
    
    <p style="margin-top:16px; font-size:0.8rem; color:#8E8E93">
      سيتم توجيهك إلى البوابة بعد التفعيل.
    </p>
  </div>

  <script>
    // ---- Configuration ----
    var APP_ID = "49858ccc-d3e8-427b-ab43-d7bb52273c1c";
    var PORTAL_URL = "https://script.google.com/macros/s/AKfycbxoZNksqNVsTboElZpMpdEDBo07Z-qI7bw0r99HELSzr37xHp3eOvvPP_aZs5F3MIbx/exec?view=sp2";

    var btn = document.getElementById('enable-btn');
    var btnText = document.getElementById('btn-text');
    var spinner = document.getElementById('spinner');
    var subscriptionInfo = document.getElementById('subscription-info');
    var subscriptionIdElement = document.getElementById('subscription-id');

    // Wait until OneSignal is fully ready
    function waitForOneSignalReady(callback) {
      if (window.OneSignal && OneSignal.Notifications && OneSignal.Notifications.requestPermission) {
        callback();
      } else {
        setTimeout(function() { waitForOneSignalReady(callback); }, 200);
      }
    }

    // Initialize OneSignal
    window.addEventListener('load', function() {
      if (!window.OneSignalDeferred) { window.OneSignalDeferred = []; }
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: APP_ID,
          serviceWorkerPath: '/El-Rashid-Notifications/OneSignalSDKWorker.js',
          serviceWorkerParam: { scope: '/El-Rashid-Notifications/' },
          promptOptions: { autoPrompt: false }
        });
        // Enable the button when ready
        waitForOneSignalReady(function() {
          btn.disabled = false;
        });
      });
    });

    // Function to get and display subscription ID
    async function getSubscriptionId() {
      try {
        const subscription = await OneSignal.User.pushSubscription.getIdAsync();
        if (subscription) {
          subscriptionIdElement.textContent = subscription;
          subscriptionInfo.style.display = 'block';
          return subscription;
        }
      } catch (error) {
        console.error('Error getting subscription ID:', error);
      }
      return null;
    }

    // Copy subscription ID to clipboard
    function copySubscriptionId() {
      const subscriptionId = subscriptionIdElement.textContent;
      if (subscriptionId) {
        navigator.clipboard.writeText(subscriptionId).then(() => {
          alert('تم نسخ المعرف بنجاح!');
        }).catch(() => {
          // Fallback for older browsers
          const textArea = document.createElement('textarea');
          textArea.value = subscriptionId;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          alert('تم نسخ المعرف بنجاح!');
        });
      }
    }

    // Make copySubscriptionId globally accessible
    window.copySubscriptionId = copySubscriptionId;

    btn.addEventListener('click', async function() {
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      waitForOneSignalReady(async function() {
        try {
          const accepted = await OneSignal.Notifications.requestPermission();
          if (accepted) {
            // Get and display the subscription ID
            const subscriptionId = await getSubscriptionId();
            
            if (subscriptionId) {
              // Add subscription ID to portal URL as query parameter
              const portalUrlWithId = PORTAL_URL + '&subscription_id=' + encodeURIComponent(subscriptionId);
              
              // Wait a bit so user can see the ID, then redirect
              setTimeout(function() { 
                window.location.href = portalUrlWithId; 
              }, 3000); // Extended to 3 seconds so user can see and copy the ID
            } else {
              // If we couldn't get the ID, redirect without it
              setTimeout(function() { 
                window.location.href = PORTAL_URL; 
              }, 1000);
            }
          } else {
            throw new Error('Permission denied');
          }
        } catch (error) {
          alert('لم يتم تفعيل الإشعارات. يمكنك المحاولة لاحقاً من إعدادات المتصفح.');
          btnText.style.display = 'inline';
          spinner.style.display = 'none';
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
