<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تفعيل الإشعارات - بوابة الرشيد</title>
    <style>
      body {
        font-family: "Cairo", sans-serif;
        background: #f2f2f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        direction: rtl;
      }
      .card {
        background: white;
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
        max-width: 400px;
        width: 90%;
      }
      .card h1 {
        font-size: 1.8rem;
        margin-bottom: 12px;
        color: #1c1c1e;
      }
      .card p {
        color: #8e8e93;
        margin-bottom: 24px;
      }
      .btn {
        background: #58cc02;
        color: white;
        border: none;
        padding: 14px 32px;
        font-size: 1.1rem;
        font-weight: 700;
        border-radius: 50px;
        cursor: pointer;
        box-shadow:
          0 4px 0 #46a302,
          0 6px 20px rgba(88, 204, 2, 0.3);
        transition: all 0.2s;
        font-family: "Cairo", sans-serif;
      }
      .btn:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #46a302;
      }
      .btn:disabled {
        opacity: 0.5;
        pointer-events: none;
      }
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-left: 8px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal {
        background: white;
        border-radius: 20px;
        padding: 32px 24px;
        max-width: 380px;
        width: 90%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: modalSlideIn 0.3s ease-out;
      }
      @keyframes modalSlideIn {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .modal-icon {
        font-size: 3rem;
        margin-bottom: 16px;
      }
      .modal h2 {
        margin: 0 0 8px 0;
        color: #1c1c1e;
        font-size: 1.4rem;
      }
      .modal p {
        color: #8e8e93;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }
      .info-box {
        background: #f2f2f7;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        text-align: right;
      }
      .info-box label {
        display: block;
        font-size: 0.8rem;
        color: #8e8e93;
        margin-bottom: 4px;
      }
      .info-box .value {
        font-family: "Courier New", monospace;
        font-size: 0.8rem;
        word-break: break-all;
        color: #007aff;
        font-weight: 600;
      }
      .modal-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 20px;
      }
      .btn-primary {
        background: #58cc02;
        color: white;
        border: none;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: 700;
        border-radius: 50px;
        cursor: pointer;
        font-family: "Cairo", sans-serif;
        box-shadow: 0 4px 0 #46a302;
        flex: 1;
      }
      .btn-primary:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #46a302;
      }

      .debug-panel {
        background: #1c1c1e;
        color: #58cc02;
        padding: 12px;
        border-radius: 12px;
        margin-top: 16px;
        font-family: "Courier New", monospace;
        font-size: 0.65rem;
        text-align: left;
        direction: ltr;
        max-height: 250px;
        overflow-y: auto;
        display: block;
      }
    </style>
    <script
      src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"
      defer
    ></script>
  </head>
  <body>
    <div class="card">
      <h1>📲 تفعيل الإشعارات</h1>
      <p>للحصول على تنبيهات الواجبات الجديدة، يرجى السماح بالإشعارات.</p>

      <button id="enable-btn" class="btn" disabled>
        <span id="btn-text">تفعيل الإشعارات</span>
        <span class="spinner" style="display: none" id="spinner"></span>
      </button>

      <div class="debug-panel" id="debug-panel">
        <span style="color: #58cc02">🟢 Waiting...</span>
      </div>

      <p style="margin-top: 16px; font-size: 0.8rem; color: #8e8e93">
        سيتم توجيهك إلى البوابة بعد التفعيل.
      </p>
    </div>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-icon">✅</div>
        <h2>تم تفعيل الإشعارات بنجاح!</h2>
        <p>معرف الاشتراك الخاص بك:</p>

        <div class="info-box">
          <label>🔑 Subscription ID:</label>
          <div class="value" id="sub-id-display">جاري التحميل...</div>
        </div>

        <div class="modal-buttons">
          <button class="btn-primary" onclick="goToPortal()">
            متابعة للبوابة ←
          </button>
        </div>
      </div>
    </div>

    <script>
      var APP_ID = "49858ccc-d3e8-427b-ab43-d7bb52273c1c";
      var PORTAL_URL =
        "https://script.google.com/macros/s/AKfycbxoZNksqNVsTboElZpMpdEDBo07Z-qI7bw0r99HELSzr37xHp3eOvvPP_aZs5F3MIbx/exec?view=sp2";

      var btn = document.getElementById("enable-btn");
      var btnText = document.getElementById("btn-text");
      var spinner = document.getElementById("spinner");
      var modalOverlay = document.getElementById("modal-overlay");
      var debugPanel = document.getElementById("debug-panel");
      var currentSubscriptionId = null;

      function debugLog(msg) {
        console.log(msg);
        var line = document.createElement("div");
        line.textContent = "> " + msg;
        debugPanel.appendChild(line);
        debugPanel.scrollTop = debugPanel.scrollHeight;
      }

      // Check service worker registration
      function checkServiceWorker() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistration().then(function (reg) {
            if (reg) {
              debugLog("✅ Service Worker found: " + reg.scope);
            } else {
              debugLog("❌ NO Service Worker registered!");
            }
          });
        }
      }

      window.addEventListener("load", function () {
        debugLog("Page loaded");
        checkServiceWorker();

        if (!window.OneSignalDeferred) {
          window.OneSignalDeferred = [];
        }
        OneSignalDeferred.push(async function (OneSignal) {
          debugLog("SDK ready");
          try {
            await OneSignal.init({
              appId: APP_ID,
              serviceWorkerPath: "OneSignalSDKWorker.js",
              serviceWorkerParam: { scope: "/" },
              promptOptions: { autoPrompt: false },
            });
            debugLog("Init OK");
          } catch (e) {
            debugLog("Init error: " + e.message);
          }
          btn.disabled = false;
        });
      });

      async function getSubscriptionId() {
        debugLog("=== Getting Subscription ID ===");

        // Check if pushSubscription object exists
        if (!OneSignal.User || !OneSignal.User.pushSubscription) {
          debugLog("❌ pushSubscription is undefined");
          return null;
        }

        // Method 1: getIdAsync
        try {
          var id = await OneSignal.User.pushSubscription.getIdAsync();
          if (id) {
            debugLog("✅ getIdAsync: " + id);
            return id;
          }
        } catch (e) {
          debugLog("getIdAsync error: " + e.message);
        }

        // Method 2: .id
        if (OneSignal.User.pushSubscription.id) {
          debugLog("✅ .id: " + OneSignal.User.pushSubscription.id);
          return OneSignal.User.pushSubscription.id;
        }

        // Method 3: Force optIn
        try {
          debugLog("🔄 Calling optIn()...");
          await OneSignal.User.pushSubscription.optIn();
          await new Promise((r) => setTimeout(r, 2000));
          var newId = await OneSignal.User.pushSubscription.getIdAsync();
          if (newId) {
            debugLog("✅ ID after optIn: " + newId);
            return newId;
          }
        } catch (e) {
          debugLog("optIn error: " + e.message);
        }

        return null;
      }

      function showModal(subId) {
        currentSubscriptionId = subId;
        document.getElementById("sub-id-display").textContent =
          subId || "لم يتم العثور على معرف";
        modalOverlay.classList.add("active");
      }

      window.goToPortal = function () {
        if (currentSubscriptionId) {
          localStorage.setItem("sp_onesignal_playerid", currentSubscriptionId);
          var url =
            PORTAL_URL +
            "&onesignal_player=" +
            encodeURIComponent(currentSubscriptionId);
          window.location.href = url;
        } else {
          window.location.href = PORTAL_URL;
        }
      };

      btn.addEventListener("click", async function () {
        btnText.style.display = "none";
        spinner.style.display = "inline-block";
        btn.disabled = true;
        debugLog("=== BUTTON CLICKED ===");

        try {
          var accepted = await OneSignal.Notifications.requestPermission();
          debugLog("Permission: " + accepted);

          if (accepted) {
            showModal("جاري التحميل...");
            var id = null;
            for (var i = 0; i < 8; i++) {
              await new Promise((r) => setTimeout(r, 2000));
              id = await getSubscriptionId();
              if (id) break;
            }
            document.getElementById("sub-id-display").textContent =
              id || "لم يتم العثور على معرف";
            currentSubscriptionId = id;
            debugLog(id ? "✅ Final ID: " + id : "❌ Failed");
          } else {
            alert("لم يتم تفعيل الإشعارات");
          }
        } catch (e) {
          debugLog("Error: " + e.message);
        } finally {
          btnText.style.display = "inline";
          spinner.style.display = "none";
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
